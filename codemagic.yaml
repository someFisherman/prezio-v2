workflows:
  # ==========================================
  # Android Build (signiert fuer Play Store)
  # ==========================================
  android-build:
    name: Android Build (Signed)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
      android_signing:
        - prezio_keystore
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Build AAB (Release - signed)
        script: flutter build appbundle --release

      - name: Build APK (Release - signed)
        script: flutter build apk --release
    
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
    
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
      email:
        recipients:
          - gloognoe@gmail.com
        notify:
          success: true
          failure: true

  # ==========================================
  # iOS Build (signiert - Apple Developer)
  # ==========================================
  ios-build-signed:
    name: iOS Build (Signed)
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Prezio
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.soleco.prezioV2
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      
      - name: Fetch latest build number from TestFlight
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number ch.soleco.prezioV2 || echo "0")
          NEXT=$((LATEST + 1))
          echo "TestFlight build: $LATEST -> next: $NEXT"
          echo "BUILD_NUM=$NEXT" >> $CM_ENV
      
      - name: Build iOS IPA (signed)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --build-number=$BUILD_NUM
      
      - name: Verify IPA exists
        script: |
          echo "=== build/ios/ipa/ ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "build/ios/ipa/ existiert nicht"
          IPA_COUNT=$(ls build/ios/ipa/*.ipa 2>/dev/null | wc -l)
          echo "Gefundene IPA-Dateien: $IPA_COUNT"
          if [ "$IPA_COUNT" -eq 0 ]; then
            echo "FEHLER: Keine IPA gefunden!"
            exit 1
          fi
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - gloognoe@gmail.com
        notify:
          success: true
          failure: true
  # ==========================================
  # iOS Build (unsigned - Fallback ohne Signierung)
  # Nutzen: Wenn ios-build-signed fehlschlägt, liefert dieser Workflow
  # eine IPA zum manuellen Testen. Oder zum Testen, ob Flutter/Xcode überhaupt baut.
  # ==========================================
  ios-build-unsigned:
    name: iOS Build (Unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      
      - name: Build iOS (unsigned)
        script: |
          export CODE_SIGN_IDENTITY=""
          export CODE_SIGNING_REQUIRED=NO
          flutter build ios --release --no-codesign
      
      - name: Create unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r prezio_unsigned.ipa Payload
          mv prezio_unsigned.ipa ../../.././
    
    artifacts:
      - "*.ipa"
      - build/ios/iphoneos/Runner.app
    
    publishing:
      email:
        recipients:
          - gloognoe@gmail.com
        notify:
          success: true
          failure: true

  # ==========================================
  # Beide Plattformen zusammen
  # ==========================================
  build-all:
    name: Build All (Android + iOS)
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Prezio
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.soleco.prezioV2
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      # Android
      - name: Build Android AAB
        script: flutter build appbundle --release
      
      # iOS
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      
      - name: Fetch latest build number from TestFlight
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number ch.soleco.prezioV2 || echo "0")
          NEXT=$((LATEST + 1))
          echo "TestFlight build: $LATEST -> next: $NEXT"
          echo "BUILD_NUM=$NEXT" >> $CM_ENV
      
      - name: Build iOS IPA (signed)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --build-number=$BUILD_NUM
    
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - gloognoe@gmail.com
        notify:
          success: true
          failure: true
